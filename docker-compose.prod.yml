version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: meetingbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - internal

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - internal

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - internal

  api:
    image: ${ECR_REGISTRY}/meetingbot-api:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - postgres
      - kafka
    networks:
      - internal

  websocket-server:
    image: ${ECR_REGISTRY}/meetingbot-websocket-server:latest
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - kafka
    networks:
      - internal

  bot-orchestrator:
    image: ${ECR_REGISTRY}/meetingbot-bot-orchestrator:latest
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - kafka
    networks:
      - internal

  audio-processor:
    image: ${ECR_REGISTRY}/meetingbot-audio-processor:latest
    restart: always
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - kafka
      - redis
    networks:
      - internal

  ai-summarizer:
    image: ${ECR_REGISTRY}/meetingbot-ai-summarizer:latest
    restart: always
    env_file: .env
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - internal

  web:
    image: ${ECR_REGISTRY}/meetingbot-web:latest
    restart: always
    ports:
      - "80:3000"
    env_file: .env
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
