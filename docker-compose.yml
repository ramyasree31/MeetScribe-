version: '3.8'

services:
  # ──────────────────────────────────────────────────────────
  # Infrastructure Services
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=meeting_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redispass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_SESSION_TIMEOUT=60000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS=60000
    ports:
      - "9092:9092"

  # ──────────────────────────────────────────────────────────
  # Application Services
  # ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - postgres
      - kafka

  websocket-server:
    build:
      context: .
      dockerfile: apps/websocket-server/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:29092
    depends_on:
      - kafka

  bot-orchestrator:
    build:
      context: .
      dockerfile: apps/bot-orchestrator/Dockerfile
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://:redispass@redis:6379
      - AUDIO_PROCESSOR_URL=ws://audio-processor:8001
      - DOCKER_NETWORK=meetingbot_default
      - BOT_KAFKA_BROKERS=kafka:29092
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
      - kafka

  audio-processor:
    build:
      context: ./apps/audio-processor
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://:redispass@redis:6379
    depends_on:
      - redis
      - kafka

  ai-summarizer:
    build:
      context: ./apps/ai-summarizer
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:29092
      - REDIS_URL=redis://:redispass@redis:6379
    depends_on:
      - postgres
      - redis
      - kafka

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=http://localhost:3001
      - API_URL=http://api:3000
    depends_on:
      - api
      - websocket-server

  # ─── Builder-only service to build/tag the Playwright bot-worker image ───
  bot-worker:
    build:
      context: ./apps/bot-worker
      dockerfile: Dockerfile
    image: meetscribe/bot-worker:latest
    entrypoint: ["echo", "bot-worker image built successfully"]

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: meetingbot_default

